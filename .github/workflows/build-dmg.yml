name: Build DMG

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-dmg:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build DMG
        run: make dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CroPDF-dmg
          path: dist/CroPDF.dmg
          if-no-files-found: error
